<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Quartz crystal: geometric faceted shape -->
  <defs>
    <linearGradient id="g1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#5b7db8"/>
      <stop offset="100%" stop-color="#3d5a96"/>
    </linearGradient>
    <linearGradient id="g2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8aa4d0"/>
      <stop offset="100%" stop-color="#5b7db8"/>
    </linearGradient>
  </defs>
  <!-- Left facet -->
  <polygon points="16,2 4,12 16,30" fill="url(#g2)" opacity="0.85"/>
  <!-- Right facet -->
  <polygon points="16,2 28,12 16,30" fill="url(#g1)"/>
  <!-- Top highlight -->
  <polygon points="16,2 4,12 16,14 28,12" fill="#a8bfde" opacity="0.6"/>
  <!-- Center edge line -->
  <line x1="16" y1="2" x2="16" y2="30" stroke="#2e4777" stroke-width="0.5" opacity="0.3"/>
</svg>
